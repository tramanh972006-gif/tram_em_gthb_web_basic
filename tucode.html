<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang cá nhân</title>
    <style>
        body {
            font-family: Arial;
            background: #eee;
            padding: 20px;
        }
        h1 {
            font-size: 36px;
        }
        h2 {
            margin-top: 20px;
        }
        table {
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 5px 10px;
        }
        form {
            margin-top: 20px;
        }
        input {
            margin-bottom: 5px;
            width: 200px;
        }
    </style>
</head>
<body>

<h1>Đặng Thị Trâm Anh</h1>

<h2>Email: tramanh@gmail.com</h2>

<h3>Đà Nẵng</h3>

<table>
    <tr>
        <th>Họ</th>
        <th>Tên</th>
        <th>Địa Chỉ</th>
        <th>Email</th>
    </tr>
    <tr>
        <td>Đặng</td>
        <td>Trâm Anh</td>
        <td>Đà Nẵng</td>
        <td>tramanh@gmail.com</td>
    </tr>
    <tr>
        <td>Nguyễn</td>
        <td>Hồng</td>
        <td>Hà Nội</td>
        <td>hongnguyen@gmail.com</td>
    </tr>
</table>

<form>
    <p>Họ Tên: <input type="text"></p>
    <p>Địa Chỉ: <input type="text"></p>
    <p>Email: <input type="email"></p>
    <p>Môn Học: <input type="text"></p>
</form>

</body>
</html>
